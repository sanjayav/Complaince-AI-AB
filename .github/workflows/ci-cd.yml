name: JLR Document Intelligence CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code Quality & Testing
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jlrdi_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'
        cache: true

    - name: Install dependencies
      run: |
        go mod download
        go mod verify

    - name: Run linter
      run: |
        # Install golangci-lint
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
        
        # Run linter
        golangci-lint run --timeout=5m

    - name: Run tests
      env:
        DB_URL: postgres://postgres:postgres@localhost:5432/jlrdi_test?sslmode=disable
        QDRANT_URL: http://localhost:6333
        AWS_ENDPOINT: http://localhost:4566
        AWS_REGION: us-east-1
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
      run: |
        # Wait for services to be ready
        sleep 10
        
        # Run tests
        go test -v -race -coverprofile=coverage.out ./...
        
        # Generate coverage report
        go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage.html

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Snyk security scan
      uses: snyk/actions/go@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  # Build Docker image
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' || github.event_name == 'release'
    
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
        aws-region: ${{ secrets.AWS_REGION_STAGING }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.5.0"

    - name: Deploy to staging
      run: |
        cd deploy/terraform
        terraform init
        terraform workspace select staging || terraform workspace new staging
        terraform plan -var-file=staging.tfvars
        terraform apply -var-file=staging.tfvars -auto-approve

    - name: Deploy application to staging
      run: |
        # Configure kubectl for staging cluster
        aws eks update-kubeconfig --name jlrdi-staging --region ${{ secrets.AWS_REGION_STAGING }}
        
        # Deploy application
        kubectl apply -f deploy/kubernetes/
        
        # Wait for deployment to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/jlrdi-api -n default

    - name: Run smoke tests
      run: |
        # Wait for service to be ready
        sleep 30
        
        # Run basic health checks
        STAGING_URL="https://staging.jlrdi.company.com"
        curl -f "$STAGING_URL/v1/health" || exit 1
        
        # Run basic functionality tests
        # Add more comprehensive tests here

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
        aws-region: ${{ secrets.AWS_REGION_PROD }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform-version: "1.5.0"

    - name: Deploy infrastructure
      run: |
        cd deploy/terraform
        terraform init
        terraform workspace select production || terraform workspace new production
        terraform plan -var-file=production.tfvars
        terraform apply -var-file=production.tfvars -auto-approve

    - name: Deploy application to production
      run: |
        # Configure kubectl for production cluster
        aws eks update-kubeconfig --name jlrdi-production --region ${{ secrets.AWS_REGION_PROD }}
        
        # Deploy application with blue-green strategy
        kubectl apply -f deploy/kubernetes/
        
        # Wait for deployment to be ready
        kubectl wait --for=condition=available --timeout=600s deployment/jlrdi-api -n default

    - name: Run production validation
      run: |
        # Wait for service to be ready
        sleep 60
        
        # Run comprehensive health checks
        PROD_URL="https://api.jlrdi.company.com"
        curl -f "$PROD_URL/v1/health" || exit 1
        
        # Run load tests
        # Add k6 or similar load testing here

    - name: Notify deployment success
      if: success()
      run: |
        # Send notification to Slack/Teams
        echo "Production deployment successful!"
        # Add notification logic here

  # Performance testing
  performance:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install k6
      run: |
        curl -L https://github.com/grafana/k6/releases/download/v0.45.0/k6-v0.45.0-linux-amd64.tar.gz | tar xz
        sudo cp k6-v0.45.0-linux-amd64/k6 /usr/local/bin

    - name: Run performance tests
      env:
        K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      run: |
        # Run k6 performance tests
        k6 run --out cloud deploy/testing/k6-load-test.js

  # Monitoring & Observability
  monitoring:
    name: Setup Monitoring
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
        aws-region: ${{ secrets.AWS_REGION_PROD }}

    - name: Deploy monitoring stack
      run: |
        # Configure kubectl
        aws eks update-kubeconfig --name jlrdi-production --region ${{ secrets.AWS_REGION_PROD }}
        
        # Deploy Prometheus
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --create-namespace \
          --values deploy/kubernetes/monitoring/prometheus-config.yaml
        
        # Deploy Grafana dashboards
        kubectl apply -f deploy/kubernetes/monitoring/grafana-dashboard.json

    - name: Configure alerting
      run: |
        # Setup PagerDuty/Slack alerts
        # Configure alerting rules
        echo "Monitoring setup complete"

  # Documentation
  docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate API documentation
      run: |
        # Generate OpenAPI/Swagger docs
        # Update deployment guides
        echo "Documentation updated"

    - name: Commit documentation updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update documentation for release ${{ github.event.release.tag_name }}" || exit 0
        git push

  # Rollback (manual trigger)
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
        aws-region: ${{ secrets.AWS_REGION_PROD }}

    - name: Rollback deployment
      run: |
        # Rollback to previous version
        aws eks update-kubeconfig --name jlrdi-production --region ${{ secrets.AWS_REGION_PROD }}
        kubectl rollout undo deployment/jlrdi-api
        
        echo "Rollback completed"

# Notifications
notifications:
  name: Notify Team
  runs-on: ubuntu-latest
  needs: [deploy-production, performance, monitoring]
  if: always()
  
  steps:
  - name: Notify on success
    if: success()
    run: |
      echo "All deployments successful!"
      # Send success notification
      
  - name: Notify on failure
    if: failure()
    run: |
      echo "Deployment failed!"
      # Send failure notification

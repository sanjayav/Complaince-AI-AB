apiVersion: apps/v1
kind: Deployment
metadata:
  name: jlrdi-api
  namespace: jlrdi
  labels:
    app: jlrdi-api
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jlrdi-api
  template:
    metadata:
      labels:
        app: jlrdi-api
        version: v1.0.0
    spec:
      containers:
      - name: api
        image: jlrdi-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: jlrdi-secrets
              key: database-url
        - name: QDRANT_URL
          value: "http://jlrdi-qdrant:6333"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jlrdi-secrets
              key: jwt-secret
        - name: S3_BUCKET
          value: "jlrdi-production"
        - name: S3_ENDPOINT
          value: "https://s3.amazonaws.com"
        - name: AWS_REGION
          value: "us-east-1"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: pages-storage
          mountPath: /tmp/jlrdi/pages
      volumes:
      - name: pages-storage
        persistentVolumeClaim:
          claimName: jlrdi-pages-pvc
      imagePullSecrets:
      - name: jlrdi-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: jlrdi-api-service
  namespace: jlrdi
spec:
  selector:
    app: jlrdi-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jlrdi-ingress
  namespace: jlrdi
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - jlrdi.yourdomain.com
    secretName: jlrdi-tls
  rules:
  - host: jlrdi.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jlrdi-api-service
            port:
              number: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jlrdi-pages-pvc
  namespace: jlrdi
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: gp2
---
apiVersion: v1
kind: Secret
metadata:
  name: jlrdi-secrets
  namespace: jlrdi
type: Opaque
data:
  database-url: <base64-encoded-database-url>
  jwt-secret: <base64-encoded-jwt-secret>
  aws-access-key: <base64-encoded-aws-access-key>
  aws-secret-key: <base64-encoded-aws-secret-key>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jlrdi-config
  namespace: jlrdi
data:
  worker-pool-size: "5"
  max-concurrent-uploads: "10"
  pdf-processing-timeout: "300"
  embedding-batch-size: "100"
